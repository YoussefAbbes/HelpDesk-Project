version: '3.9'

services:
  # -------------------------------------------------------------------------
  # PostgreSQL database
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-helpdesk_db}
      POSTGRES_USER: ${DB_USER:-helpdesk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-helpdesk_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-helpdesk_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis broker (for Celery) + result store
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Django backend (Gunicorn)
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn helpdesk.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ai_models_cache:/app/ai_models_cache
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=helpdesk.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-True}
      - DB_NAME=${DB_NAME:-helpdesk_db}
      - DB_USER=${DB_USER:-helpdesk_user}
      - DB_PASSWORD=${DB_PASSWORD:-helpdesk_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Celery worker — runs AI inference tasks asynchronously
  # -------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A helpdesk worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ai_models_cache:/app/ai_models_cache
    environment:
      - DJANGO_SETTINGS_MODULE=helpdesk.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-True}
      - DB_NAME=${DB_NAME:-helpdesk_db}
      - DB_USER=${DB_USER:-helpdesk_user}
      - DB_PASSWORD=${DB_PASSWORD:-helpdesk_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db

  # -------------------------------------------------------------------------
  # Celery beat — periodic task scheduler (optional analytics refresh)
  # -------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A helpdesk beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=helpdesk.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DB_NAME=${DB_NAME:-helpdesk_db}
      - DB_USER=${DB_USER:-helpdesk_user}
      - DB_PASSWORD=${DB_PASSWORD:-helpdesk_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery_worker

  # -------------------------------------------------------------------------
  # React frontend (Vite dev server)
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  ai_models_cache:
